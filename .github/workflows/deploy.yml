# 自托管 Runner（ZYS-V1）构建镜像 → 推送 CCR → 部署 k3s
# 凭据仅通过 GitHub Secrets / Variables 注入，仓库内不含密码。
#
# Runner 要求：组织 Runner「ZYS-V1」需添加自定义标签 ZYS-V1
#   GitHub → zysicyj-xxc → Settings → Actions → Runners → ZYS-V1 → Labels
#
# 建议配置（优先用组织 Variables，仓库级可覆盖）：
#   vars.CCR              镜像仓库前缀，如 ccr.ccs.tencentyun.com/zysicyj/storehouse1
#   vars.DEPLOY_HOST      Ingress 域名，如 workbuddy.zysicyj.top
#   vars.KUBECONFIG_FILE  Runner 本机 kubeconfig（须指向 master 公网 6443，
#                         默认 C:\code\.kube\config.public → https://119.45.242.45:6443）
#   secrets.CCR_USERNAME / secrets.CCR_PASSWORD

name: Build and Deploy WorkBuddy-Tool

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: workbuddy-deploy
  cancel-in-progress: true

env:
  CCR: ${{ vars.CCR || 'your-registry.example.com/your-namespace' }}
  KUBECONFIG_FILE: ${{ vars.KUBECONFIG_FILE || 'C:\code\.kube\config.public' }}
  DOCKER_BUILDKIT: "1"
  DOCKER_EXE: C:\Program Files\Docker\Docker\resources\bin\docker.exe
  KUBECTL_EXE: C:\Program Files\Docker\Docker\resources\bin\kubectl.exe
  NAMESPACE: workbuddy
  DEPLOY_NAME: workbuddy-tool
  IMAGE_NAME: workbuddy-tool
  HOST: ${{ vars.DEPLOY_HOST || 'workbuddy.example.com' }}

jobs:
  build-and-deploy:
    if: github.repository == 'zysicyj-xxc/workbuddy-tool'
    runs-on: [self-hosted, ZYS-V1]
    defaults:
      run:
        shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        run: |
          $tag = "$(Get-Date -Format 'yyyyMMddHHmmss')-$($env:GITHUB_SHA.Substring(0,7))"
          Add-Content -Path $env:GITHUB_ENV -Value "IMAGE_TAG=$tag"
          Write-Host "Image tag: $tag"

      - name: Login to container registry
        run: |
          & $env:DOCKER_EXE login $env:CCR -u ${{ secrets.CCR_USERNAME }} -p ${{ secrets.CCR_PASSWORD }}

      - name: Build and push image
        run: |
          $tagged = "$($env:CCR):$($env:IMAGE_NAME)-$($env:IMAGE_TAG)"
          $latest = "$($env:CCR):$($env:IMAGE_NAME)-latest"
          & $env:DOCKER_EXE build -t $tagged -t $latest -f Dockerfile .
          & $env:DOCKER_EXE push $tagged
          & $env:DOCKER_EXE push $latest
          Write-Host "Pushed: $tagged"
          Write-Host "Pushed: $latest"

      - name: Render K8s manifests
        run: |
          $tagged = "$($env:CCR):$($env:IMAGE_NAME)-$($env:IMAGE_TAG)"
          $manifest = Get-Content deploy/k8s.yaml -Raw
          $manifest = $manifest.Replace(
            'your-registry.example.com/your-namespace/workbuddy-tool:latest',
            $tagged
          )
          $manifest = $manifest.Replace('workbuddy.example.com', $env:HOST)
          Set-Content -Path deploy/k8s.rendered.yaml -Value $manifest -Encoding utf8
          Write-Host "Rendered image=$tagged host=$($env:HOST)"

      - name: Ensure namespace and secrets
        run: |
          $k = $env:KUBECTL_EXE
          $kc = "--kubeconfig=$($env:KUBECONFIG_FILE)"
          & $k $kc create namespace $env:NAMESPACE --dry-run=client -o yaml | & $k $kc apply -f -
          foreach ($s in @('ccr-registry','workbuddy-tls')) {
            $exists = & $k $kc get secret $s -n $env:NAMESPACE --ignore-not-found -o name 2>$null
            if ($exists) {
              Write-Host "Secret $s already exists in $($env:NAMESPACE), skip"
              continue
            }
            Write-Host "Copying secret $s from default to $($env:NAMESPACE)"
            $json = & $k $kc get secret $s -n default -o json
            $obj = $json | ConvertFrom-Json
            $obj.metadata.PSObject.Properties.Remove('uid')
            $obj.metadata.PSObject.Properties.Remove('resourceVersion')
            $obj.metadata.PSObject.Properties.Remove('creationTimestamp')
            $obj.metadata.namespace = $env:NAMESPACE
            $obj | ConvertTo-Json -Depth 10 | & $k $kc apply -n $env:NAMESPACE -f -
          }

      - name: Apply K8s manifests
        run: |
          $k = $env:KUBECTL_EXE
          $kc = "--kubeconfig=$($env:KUBECONFIG_FILE)"
          & $k $kc apply -f deploy/k8s.rendered.yaml

      - name: Rollout deployment
        run: |
          $k = $env:KUBECTL_EXE
          $kc = "--kubeconfig=$($env:KUBECONFIG_FILE)"
          $tagged = "$($env:CCR):$($env:IMAGE_NAME)-$($env:IMAGE_TAG)"
          & $k $kc -n $env:NAMESPACE set image deployment/$env:DEPLOY_NAME workbuddy-tool=$tagged
          & $k $kc -n $env:NAMESPACE rollout status deployment/$env:DEPLOY_NAME --timeout=180s
          & $k $kc -n $env:NAMESPACE get pods -o wide

      - name: Verify health
        run: |
          $url = "https://$($env:HOST)/api/health"
          Write-Host "Checking $url"
          for ($i = 1; $i -le 12; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 10
              if ($resp.StatusCode -eq 200) {
                Write-Host "Health OK: $($resp.StatusCode)"
                exit 0
              }
            } catch {
              Write-Host "Attempt $i/12 failed: $($_.Exception.Message)"
            }
            Start-Sleep -Seconds 10
          }
          Write-Error "Health check failed after rollout"
          exit 1
