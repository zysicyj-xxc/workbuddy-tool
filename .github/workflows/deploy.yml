# 自托管 Runner（ZYS-V1）构建镜像 → 推送 CCR → 部署 k3s
# 凭据仅通过 GitHub Secrets / Variables 注入，仓库内不含密码。
#
# Runner 要求：组织 Runner「ZYS-V1」需添加自定义标签 ZYS-V1
#
# 组织级配置（visibility=all，所有仓库可用）：
#   vars.K3S_API_SERVER   master 公网 API，如 https://119.45.242.45:6443
#   vars.CCR              镜像仓库前缀
#   vars.DEPLOY_HOST      Ingress 域名（各仓库可覆盖）
#   secrets.K3S_TOKEN     ServiceAccount token（见 deploy/k8s-github-actions-rbac.yaml）
#   secrets.K3S_CA        集群 CA 证书 PEM
#   secrets.CCR_USERNAME / secrets.CCR_PASSWORD

name: Build and Deploy WorkBuddy-Tool

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: workbuddy-deploy
  cancel-in-progress: true

env:
  CCR: ${{ vars.CCR || 'your-registry.example.com/your-namespace' }}
  K3S_API_SERVER: ${{ vars.K3S_API_SERVER || 'https://119.45.242.45:6443' }}
  DOCKER_BUILDKIT: "1"
  NAMESPACE: workbuddy
  DEPLOY_NAME: workbuddy-tool
  IMAGE_NAME: workbuddy-tool
  HOST: ${{ vars.DEPLOY_HOST || 'workbuddy.example.com' }}

jobs:
  build-and-deploy:
    if: github.repository == 'zysicyj-xxc/workbuddy-tool'
    runs-on: [self-hosted, ZYS-V1]
    defaults:
      run:
        shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve docker and kubectl
        run: |
          function Find-Tool([string]$name, [string[]]$candidates) {
            foreach ($p in $candidates) {
              if ($p -and (Test-Path -LiteralPath $p)) { return (Resolve-Path -LiteralPath $p).Path }
            }
            $cmd = Get-Command $name -ErrorAction SilentlyContinue
            if ($cmd) { return $cmd.Source }
            return $null
          }
          Write-Host "hostname=$(hostname) user=$env:USERNAME pwd=$PWD"
          Write-Host "PATH=$env:PATH"
          $dockerCandidates = @(
            $env:DOCKER_EXE,
            'C:\Program Files\Docker\Docker\resources\bin\docker.exe',
            'C:\ProgramData\chocolatey\bin\docker.exe'
          )
          $kubectlCandidates = @(
            $env:KUBECTL_EXE,
            'C:\Program Files\Docker\Docker\resources\bin\kubectl.exe',
            'C:\ProgramData\chocolatey\bin\kubectl.exe',
            'C:\kubectl\kubectl.exe',
            (Join-Path $env:RUNNER_TEMP 'kubectl.exe')
          )
          $docker = Find-Tool 'docker.exe' $dockerCandidates
          $kubectl = Find-Tool 'kubectl.exe' $kubectlCandidates
          if (-not $kubectl) {
            $ver = 'v1.32.2'
            $out = Join-Path $env:RUNNER_TEMP 'kubectl.exe'
            Write-Host "kubectl not found, downloading $ver -> $out"
            Invoke-WebRequest -Uri "https://dl.k8s.io/release/$ver/bin/windows/amd64/kubectl.exe" -OutFile $out -UseBasicParsing
            $kubectl = $out
          }
          if (-not $docker) { Write-Error 'docker.exe not found on runner PATH / common paths'; exit 1 }
          Add-Content -Path $env:GITHUB_ENV -Value "DOCKER_EXE=$docker"
          Add-Content -Path $env:GITHUB_ENV -Value "KUBECTL_EXE=$kubectl"
          Write-Host "DOCKER_EXE=$docker"
          Write-Host "KUBECTL_EXE=$kubectl"
          & $docker version
          & $kubectl version --client

      - name: Configure kubectl from token
        env:
          K3S_TOKEN: ${{ secrets.K3S_TOKEN }}
          K3S_CA: ${{ secrets.K3S_CA }}
        run: |
          if (-not $env:K3S_TOKEN -or -not $env:K3S_CA) {
            Write-Error "Missing org secrets K3S_TOKEN / K3S_CA"
            exit 1
          }
          $kubeDir = Join-Path $env:RUNNER_TEMP 'kube'
          New-Item -ItemType Directory -Force -Path $kubeDir | Out-Null
          $kubeConfig = Join-Path $kubeDir 'config'
          $caFile = Join-Path $kubeDir 'ca.crt'
          [System.IO.File]::WriteAllText($caFile, $env:K3S_CA.Trim())
          & $env:KUBECTL_EXE config set-cluster k3s `
            --server=$env:K3S_API_SERVER `
            --certificate-authority=$caFile `
            --embed-certs=true `
            --kubeconfig=$kubeConfig | Out-Null
          & $env:KUBECTL_EXE config set-credentials github-actions `
            --token=$env:K3S_TOKEN `
            --kubeconfig=$kubeConfig | Out-Null
          & $env:KUBECTL_EXE config set-context default `
            --cluster=k3s --user=github-actions `
            --kubeconfig=$kubeConfig | Out-Null
          & $env:KUBECTL_EXE config use-context default --kubeconfig=$kubeConfig | Out-Null
          Add-Content -Path $env:GITHUB_ENV -Value "KUBECONFIG_FILE=$kubeConfig"
          & $env:KUBECTL_EXE --kubeconfig=$kubeConfig get deploy -n $env:NAMESPACE
          Write-Host "kubectl ready via token -> $env:K3S_API_SERVER"

      - name: Set image tag
        run: |
          # 优先：git tag（v1.2.3）→ frontend/package.json → 兜底 1.0.0
          $appVersion = $null
          if ($env:GITHUB_REF_NAME -match '^v?(\d+\.\d+\.\d+)$') {
            $appVersion = $Matches[1]
          }
          if (-not $appVersion) {
            $pkgPath = Join-Path $PWD 'frontend/package.json'
            if (Test-Path -LiteralPath $pkgPath) {
              # 用正则取 version，避免 PowerShell 默认编码解析含中文的 JSON 失败
              $raw = [System.IO.File]::ReadAllText($pkgPath)
              if ($raw -match '"version"\s*:\s*"(\d+\.\d+\.\d+)"') {
                $appVersion = $Matches[1]
              }
            }
          }
          if (-not $appVersion) { $appVersion = '1.0.0' }
          $buildTime = Get-Date -Format 'yyyy-MM-dd HH:mm:ss'
          $sha = $env:GITHUB_SHA.Substring(0,7)
          # 用户指定版本 tag；同时保留带 sha 的唯一标签便于回滚
          Add-Content -Path $env:GITHUB_ENV -Value "APP_VERSION=$appVersion"
          Add-Content -Path $env:GITHUB_ENV -Value "APP_BUILD_TIME=$buildTime"
          Add-Content -Path $env:GITHUB_ENV -Value "GIT_SHA=$sha"
          Add-Content -Path $env:GITHUB_ENV -Value "IMAGE_TAG=$appVersion"
          Add-Content -Path $env:GITHUB_ENV -Value "IMAGE_TAG_SHA=$appVersion-$sha"
          Write-Host "version=$appVersion build_time=$buildTime sha=$sha"

      - name: Login to container registry
        env:
          CCR_USERNAME: ${{ secrets.CCR_USERNAME }}
          CCR_PASSWORD: ${{ secrets.CCR_PASSWORD }}
        run: |
          $registry = ($env:CCR -split '/')[0]
          $loggedIn = $false
          if ($env:CCR_USERNAME -and $env:CCR_PASSWORD) {
            Write-Host "Trying docker login $registry as $($env:CCR_USERNAME)"
            $env:CCR_PASSWORD | & $env:DOCKER_EXE login $registry -u $env:CCR_USERNAME --password-stdin
            if ($LASTEXITCODE -eq 0) { $loggedIn = $true }
          }
          if (-not $loggedIn) {
            Write-Host "Secret login unavailable; probing existing docker credentials on self-hosted runner"
            & $env:DOCKER_EXE pull "$($env:CCR):$($env:IMAGE_NAME)-latest"
            if ($LASTEXITCODE -ne 0) {
              Write-Error "CCR auth failed: update repo secrets CCR_USERNAME/CCR_PASSWORD (login host=$registry)"
              exit 1
            }
            Write-Host "Existing docker credentials OK"
          }

      - name: Build and push image
        run: |
          $tagged = "$($env:CCR):$($env:IMAGE_NAME)-$($env:IMAGE_TAG)"
          $taggedSha = "$($env:CCR):$($env:IMAGE_NAME)-$($env:IMAGE_TAG_SHA)"
          $latest = "$($env:CCR):$($env:IMAGE_NAME)-latest"
          & $env:DOCKER_EXE build `
            --build-arg "APP_VERSION=$($env:APP_VERSION)" `
            --build-arg "APP_BUILD_TIME=$($env:APP_BUILD_TIME)" `
            --build-arg "GIT_SHA=$($env:GIT_SHA)" `
            -t $tagged -t $taggedSha -t $latest -f Dockerfile .
          & $env:DOCKER_EXE push $tagged
          & $env:DOCKER_EXE push $taggedSha
          & $env:DOCKER_EXE push $latest
          Write-Host "Pushed: $tagged"
          Write-Host "Pushed: $taggedSha"
          Write-Host "Pushed: $latest"

      - name: Render K8s manifests
        run: |
          $tagged = "$($env:CCR):$($env:IMAGE_NAME)-$($env:IMAGE_TAG_SHA)"
          $manifest = Get-Content deploy/k8s.yaml -Raw
          $manifest = $manifest.Replace(
            'your-registry.example.com/your-namespace/workbuddy-tool:latest',
            $tagged
          )
          $manifest = $manifest.Replace('workbuddy.example.com', $env:HOST)
          Set-Content -Path deploy/k8s.rendered.yaml -Value $manifest -Encoding utf8
          Write-Host "Rendered image=$tagged host=$($env:HOST)"

      - name: Ensure namespace and secrets
        run: |
          $k = $env:KUBECTL_EXE
          $kc = "--kubeconfig=$($env:KUBECONFIG_FILE)"
          & $k $kc create namespace $env:NAMESPACE --dry-run=client -o yaml | & $k $kc apply -f -
          foreach ($s in @('ccr-registry','zysicyj-tls')) {
            $exists = & $k $kc get secret $s -n $env:NAMESPACE --ignore-not-found -o name 2>$null
            if ($exists) {
              Write-Host "Secret $s already exists in $($env:NAMESPACE), skip"
              continue
            }
            Write-Host "Copying secret $s from default to $($env:NAMESPACE)"
            $json = & $k $kc get secret $s -n default -o json 2>$null
            if (-not $json) {
              Write-Warning "Secret $s not found in default either; skip (Ingress may already use another TLS secret)"
              continue
            }
            $obj = $json | ConvertFrom-Json
            if (-not $obj) { continue }
            $obj.metadata.PSObject.Properties.Remove('uid')
            $obj.metadata.PSObject.Properties.Remove('resourceVersion')
            $obj.metadata.PSObject.Properties.Remove('creationTimestamp')
            $obj.metadata.namespace = $env:NAMESPACE
            $obj | ConvertTo-Json -Depth 10 | & $k $kc apply -n $env:NAMESPACE -f -
          }

      - name: Apply K8s manifests
        run: |
          $k = $env:KUBECTL_EXE
          $kc = "--kubeconfig=$($env:KUBECONFIG_FILE)"
          & $k $kc apply -f deploy/k8s.rendered.yaml

      - name: Rollout deployment
        run: |
          $k = $env:KUBECTL_EXE
          $kc = "--kubeconfig=$($env:KUBECONFIG_FILE)"
          $tagged = "$($env:CCR):$($env:IMAGE_NAME)-$($env:IMAGE_TAG_SHA)"
          & $k $kc -n $env:NAMESPACE set image deployment/$env:DEPLOY_NAME workbuddy-tool=$tagged
          & $k $kc -n $env:NAMESPACE annotate deployment/$env:DEPLOY_NAME `
            "workbuddy.io/version=$($env:APP_VERSION)" `
            "workbuddy.io/build-time=$($env:APP_BUILD_TIME)" `
            "workbuddy.io/git-sha=$($env:GIT_SHA)" --overwrite
          & $k $kc -n $env:NAMESPACE rollout status deployment/$env:DEPLOY_NAME --timeout=180s
          & $k $kc -n $env:NAMESPACE get pods -o wide

      - name: Verify health
        run: |
          $url = "https://$($env:HOST)/api/health"
          $verUrl = "https://$($env:HOST)/api/version"
          Write-Host "Checking $url"
          for ($i = 1; $i -le 12; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 10
              if ($resp.StatusCode -eq 200) {
                Write-Host "Health OK: $($resp.StatusCode)"
                $ver = Invoke-RestMethod -Uri $verUrl -TimeoutSec 10
                Write-Host ("Version: {0} build_time={1} sha={2}" -f $ver.version, $ver.build_time, $ver.git_sha)
                if ($ver.version -ne $env:APP_VERSION) {
                  Write-Error "Version mismatch: got $($ver.version) expected $($env:APP_VERSION)"
                  exit 1
                }
                exit 0
              }
            } catch {
              Write-Host "Attempt $i/12 failed: $($_.Exception.Message)"
            }
            Start-Sleep -Seconds 10
          }
          Write-Error "Health check failed after rollout"
          exit 1
