apiVersion: v1
kind: Namespace
metadata:
  name: workbuddy
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: workbuddy-data
  namespace: workbuddy
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workbuddy-tool
  namespace: workbuddy
  labels:
    app: workbuddy-tool
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: workbuddy-tool
  template:
    metadata:
      labels:
        app: workbuddy-tool
    spec:
      imagePullSecrets:
        - name: ccr-registry
      containers:
        - name: workbuddy-tool
          image: ccr.ccs.tencentyun.com/zysicyj/storehouse1:workbuddy-tool-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          livenessProbe:
            httpGet:
              path: /api/dashboard
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/dashboard
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /root/.workbuddy-tool
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: workbuddy-data
---
apiVersion: v1
kind: Service
metadata:
  name: workbuddy-tool
  namespace: workbuddy
spec:
  type: ClusterIP
  selector:
    app: workbuddy-tool
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workbuddy-ingress
  namespace: workbuddy
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: workbuddy.zysicyj.top
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: workbuddy-tool
                port:
                  number: 8000
  tls:
    - hosts:
        - workbuddy.zysicyj.top
      secretName: zysicyj-tls
