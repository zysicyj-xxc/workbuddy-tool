apiVersion: v1
kind: Namespace
metadata:
  name: antigravity
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: antigravity-data
  namespace: antigravity
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: antigravity-web
  namespace: antigravity
  labels:
    app: antigravity-web
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: antigravity-web
  template:
    metadata:
      labels:
        app: antigravity-web
    spec:
      imagePullSecrets:
        - name: ccr-registry
      containers:
        - name: antigravity-web
          image: ccr.ccs.tencentyun.com/zysicyj/storehouse1:antigravity-web-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          livenessProbe:
            httpGet:
              path: /api/dashboard/stats
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/dashboard/stats
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /root/.antigravity-tools
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: antigravity-data
---
apiVersion: v1
kind: Service
metadata:
  name: antigravity-web
  namespace: antigravity
spec:
  type: ClusterIP
  selector:
    app: antigravity-web
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: antigravity-ingress
  namespace: antigravity
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: antigravity.zysicyj.top
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: antigravity-web
                port:
                  number: 8000
  tls:
    - hosts:
        - antigravity.zysicyj.top
      secretName: zysicyj-tls
