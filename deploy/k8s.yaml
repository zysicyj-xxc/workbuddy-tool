apiVersion: v1
kind: Namespace
metadata:
  name: workbuddy
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: workbuddy-data
  namespace: workbuddy
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
# workbuddy-db-conf Secret 需单独创建（凭据不入库）：
#   kubectl create secret generic workbuddy-db-conf -n workbuddy \
#     --from-literal=DB_CONF='{"host":"...","port":3306,"user":"...","passwd":"...","database":"workbuddy","charset":"utf8mb4"}' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# workbuddy-basic-auth Secret 需单独创建（凭据不入库）：
#   kubectl create secret generic workbuddy-basic-auth -n workbuddy \
#     --from-literal=BASIC_AUTH_USER=admin \
#     --from-literal=BASIC_AUTH_PASSWORD='CHANGE_ME' \
#     --dry-run=client -o yaml | kubectl apply -f -
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workbuddy-tool
  namespace: workbuddy
  labels:
    app: workbuddy-tool
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: workbuddy-tool
  template:
    metadata:
      labels:
        app: workbuddy-tool
    spec:
      imagePullSecrets:
        - name: ccr-registry
      # 可选：固定到指定节点 / 污点（按集群填写，勿提交真实主机名）
      # nodeSelector:
      #   kubernetes.io/hostname: your-node-name
      # tolerations:
      #   - key: "dedicated"
      #     operator: "Equal"
      #     value: "high-bandwidth"
      #     effect: "NoSchedule"
      containers:
        - name: workbuddy-tool
          # 按自己的镜像仓库修改
          image: your-registry.example.com/your-namespace/workbuddy-tool:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8002
              name: proxy
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            - name: DB_CONF
              valueFrom:
                secretKeyRef:
                  name: workbuddy-db-conf
                  key: DB_CONF
            - name: BASIC_AUTH_USER
              valueFrom:
                secretKeyRef:
                  name: workbuddy-basic-auth
                  key: BASIC_AUTH_USER
            - name: BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workbuddy-basic-auth
                  key: BASIC_AUTH_PASSWORD
            # 出站 TLS / 代理按环境按需配置（勿写入真实内网地址）
            - name: HTTP_SSL_VERIFY
              value: "true"
            - name: OUTBOUND_PROXY
              value: ""
          volumeMounts:
            - name: data
              mountPath: /root/.workbuddy-tool
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: workbuddy-data
---
apiVersion: v1
kind: Service
metadata:
  name: workbuddy-tool
  namespace: workbuddy
spec:
  type: ClusterIP
  selector:
    app: workbuddy-tool
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
    - name: proxy
      port: 8002
      targetPort: 8002
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workbuddy-ingress
  namespace: workbuddy
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: workbuddy.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: workbuddy-tool
                port:
                  number: 8000
  tls:
    - hosts:
        - workbuddy.example.com
      secretName: workbuddy-tls
